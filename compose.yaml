name: health-assessment

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-health_assessment}
      POSTGRES_USER: ${POSTGRES_USER:-health_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-health_app} -d ${POSTGRES_DB:-health_assessment}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - backend

  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-health_app}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-health_assessment}?schema=public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    restart: "no"

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      DATABASE_URL: postgresql://${POSTGRES_USER:-health_app}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-health_assessment}?schema=public
    depends_on:
      migrate:
        condition: service_completed_successfully
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - backend
      - frontend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - frontend

volumes:
  postgres_data:

networks:
  backend:
    internal: true
  frontend:
